{% extends 'base.html' %}
{% block title %}Proje Ekle | MYKEEP{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Yeni Proje</h1>
    </div>
    <div class="bg-white border border-slate-200 rounded-3xl shadow-sm p-10">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <div class="flex items-center justify-between pt-10 border-t border-slate-100 mt-4">
                <a href="{% url 'proje_listesi' %}" class="text-sm font-bold text-slate-400 hover:text-slate-600 transition flex items-center">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Vazgeç
                </a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3.5 rounded-2xl font-bold text-sm shadow-lg shadow-blue-500/20 transition-all active:scale-95">
                    <i class="fa-solid fa-plus mr-2"></i> Projeyi Kaydet
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
