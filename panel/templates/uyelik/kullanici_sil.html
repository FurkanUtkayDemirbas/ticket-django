{% extends 'base.html' %}
{% block title %}Kullanıcı Sil{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white border border-red-200 rounded-3xl shadow-sm overflow-hidden">
        <div class="p-10 text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-5">
                <i class="fa-solid fa-user-xmark text-red-500 text-2xl"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-slate-800 mb-2">Kullanıcıyı Sil</h2>
            <p class="text-slate-500 text-sm mb-1">
                <span class="font-bold text-slate-700">{{ kullanici.username }}</span> hesabını silmek istediğinize emin misiniz?
            </p>
            <p class="text-xs text-red-500 mb-8">Bu işlem geri alınamaz.</p>

            <form method="post" class="flex items-center justify-center space-x-4">
                {% csrf_token %}
                <a href="{% url 'uyelik:kullanici_listesi' %}"
                   class="px-6 py-2.5 rounded-xl border border-slate-200 text-slate-600 font-semibold text-sm hover:bg-slate-50 transition">
                    İptal
                </a>
                <button type="submit"
                    class="bg-red-600 hover:bg-red-700 text-white px-8 py-2.5 rounded-xl font-bold text-sm shadow-md transition-all active:scale-95">
                    <i class="fa-solid fa-trash mr-2"></i>Evet, Sil
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
