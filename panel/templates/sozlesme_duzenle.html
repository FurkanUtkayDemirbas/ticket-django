{% extends 'base.html' %}
{% block title %}Düzenle: {{ kayit.sozlesmeno }}{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto">
    <div class="flex items-end justify-between mb-8">
        <div>
            <nav class="flex text-[10px] text-slate-400 uppercase tracking-widest mb-2 space-x-2">
                <a href="{% url 'sozlesme_listesi' %}" class="hover:text-blue-600">Sözleşmeler</a>
                <span>/</span>
                <span class="text-slate-600">Düzenle</span>
            </nav>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Sözleşme Güncelle</h1>
        </div>
        <div class="text-right pb-1">
            <span class="text-xs font-bold text-slate-400 uppercase block">Sözleşme No</span>
            <span class="text-xl font-black text-blue-600">{{ kayit.sozlesmeno }}</span>
        </div>
    </div>

    <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
        <form method="post" class="p-10 space-y-7">
            {% csrf_token %}
            {% for field in form %}
            <div class="group">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-1">
                    {{ field.label }}
                </label>
                {{ field }}
            </div>
            {% endfor %}

            <div class="flex items-center justify-between pt-10 border-t border-slate-100 mt-4">
                <a href="{% url 'sozlesme_listesi' %}" class="text-sm font-bold text-slate-400 hover:text-slate-600 flex items-center">
                    <i class="fa-solid fa-arrow-left mr-2"></i> İptal
                </a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3.5 rounded-2xl font-bold text-sm shadow-lg shadow-blue-500/20 transition-all active:scale-95">
                    <i class="fa-solid fa-floppy-disk mr-2"></i> Değişiklikleri Kaydet
                </button>
            </div>
        </form>
    </div>
</div>


{% endblock %}
